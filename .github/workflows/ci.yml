name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud needs full history for blame data

      # ── 2. JDK ───────────────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # ── 3. Maven cache ────────────────────────────────────────────────────
      # Caches both the Maven artifact repository and the OWASP NVD database.
      # The NVD database is stored at ~/.m2/dependency-check-data (configured
      # via <dataDirectory> in pom.xml -Psecurity) and can take several minutes
      # to download on a cold run — subsequent runs restore it from cache.
      - name: Cache Maven repository and OWASP NVD data
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.m2/dependency-check-data
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ── 4. Build, tests, JaCoCo coverage ─────────────────────────────────
      # install (not just verify) so internal modules are available in ~/.m2
      # for the OWASP and SonarCloud steps that follow.
      - name: Build and run tests
        run: mvn clean install --no-transfer-progress

      # ── 5. OWASP Dependency-Check ─────────────────────────────────────────
      # Runs only on pushes to main to avoid slowing down PR reviews.
      # Fails the build if any dependency has a CVSS score >= 7 (HIGH/CRITICAL).
      # NVD_API_KEY reduces rate-limiting on the NVD database download.
      - name: OWASP Dependency Check
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: mvn dependency-check:check -Psecurity -DossindexAnalyzerEnabled=false -DnvdApiKey=${NVD_API_KEY} --no-transfer-progress

      # ── 6. SonarCloud analysis ────────────────────────────────────────────
      # Skips gracefully when SONAR_TOKEN is absent (no build failure).
      # Requires: Settings > Secrets > Actions > SONAR_TOKEN
      # Create token at: https://sonarcloud.io > My Account > Security
      - name: SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "$SONAR_TOKEN" ]; then
            mvn sonar:sonar -Psonar --no-transfer-progress
          else
            echo "SONAR_TOKEN not configured — skipping SonarCloud analysis"
          fi
